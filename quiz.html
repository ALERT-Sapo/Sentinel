<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shock or No Shock? — Compress to Success</title>
<style>
/* System monospace and sans stacks — no external font dependency */
:root {
  --mono: 'Courier New', Courier, monospace;
  --sans: 'Arial Black', 'Arial Bold', Arial, sans-serif;
  --green: #00e676;
  --green-dim: #0d2a0d;
  --green-mid: #1a5a1a;
  --green-dark: #080e08;
  --red: #ff3b3b;
  --red-dark: #cc2200;
  --blue: #1199ee;
  --blue-dark: #004488;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  background: #111;
  min-height: 100vh;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 24px 12px;
  font-family: Arial, sans-serif;
}
.wrap {
  width: 100%;
  max-width: 680px;
}
.r {
  background: var(--green-dark);
  border-radius: 10px;
  overflow: hidden;
  border: 1px solid #0d2a0d;
}
.hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 18px;
  border-bottom: 1px solid #0d2a0d;
  gap: 8px;
  flex-wrap: wrap;
}
.logo { font-family: var(--mono); font-size: 10px; color: #1a4a1a; letter-spacing: 2px; }
.vits { display: flex; gap: 14px; }
.vit { font-family: var(--mono); font-size: 10px; color: #0d3a0d; letter-spacing: 1px; }
.vit span { color: var(--green); font-size: 13px; font-weight: 700; }
.dots { display: flex; gap: 4px; flex-wrap: wrap; }
.dot { width: 7px; height: 7px; border-radius: 50%; background: #0d2a0d; border: 1px solid #1a3a1a; transition: all .3s; }
.dot.ok { background: var(--green); border-color: var(--green); }
.dot.no { background: var(--red); border-color: var(--red); }
.body { padding: 14px 18px; }
.lbl {
  font-family: var(--mono); font-size: 9px; color: #1a4a1a; letter-spacing: 2px;
  margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center;
}
.phase-badge {
  font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px;
  padding: 2px 8px; border-radius: 3px;
}
.phase-cpr    { background: #001a00; border: 1px solid #005500; color: #00aa44; }
.phase-analyze{ background: #001a0a; border: 1px solid #00aa66; color: #00dd88; }
.phase-rhythm { background: #001400; border: 1px solid var(--green); color: var(--green); }
.screen {
  background: #020802; border: 1px solid #0d2a0d; border-radius: 4px;
  margin-bottom: 12px; overflow: hidden;
}
.screen canvas { display: block; width: 100%; height: 128px; }
.cpr-bar { height: 3px; background: #0d2a0d; margin-bottom: 12px; border-radius: 2px; overflow: hidden; }
.cpr-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width .08s linear; }
.cpr-label { font-family: var(--mono); font-size: 9px; color: #1a6a1a; letter-spacing: 1.5px; margin-bottom: 3px; }
.qs { font-family: var(--mono); font-size: 10px; color: var(--green-mid); letter-spacing: 1.5px; margin-bottom: 4px; }
.pt { font-size: 16px; font-weight: 700; color: #5ab85a; margin-bottom: 13px; min-height: 26px; font-family: Arial, sans-serif; }
.btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.btn {
  padding: 14px; border: 1px solid; border-radius: 5px;
  font-family: var(--sans); font-size: 18px; font-weight: 900;
  letter-spacing: 2px; cursor: pointer; transition: all .15s; text-transform: uppercase;
}
.bs { background: #0a0200; border-color: var(--red-dark); color: var(--red); }
.bs:hover:not(:disabled) { background: #1a0400; border-color: var(--red); }
.bn { background: #000510; border-color: var(--blue-dark); color: var(--blue); }
.bn:hover:not(:disabled) { background: #000a18; border-color: var(--blue); }
.btn:disabled { cursor: not-allowed; }
.btn.locked { opacity: .25; }
.btn.sc { background: #001800; border-color: var(--green); color: var(--green); }
.btn.sw { background: #180000; border-color: var(--red); color: var(--red); }
.btn.rv { background: #001800; border-color: var(--green); color: var(--green); }
.fb { border-radius: 5px; padding: 11px 13px; margin-bottom: 11px; border: 1px solid; }
.fb.ok { background: #001400; border-color: var(--green); }
.fb.no { background: #140000; border-color: var(--red); }
.ft { font-size: 17px; font-weight: 700; letter-spacing: 2px; margin-bottom: 4px; text-transform: uppercase; font-family: Arial, sans-serif; }
.fb.ok .ft { color: var(--green); }
.fb.no .ft { color: var(--red); }
.fr { display: inline-block; background: #003300; border: 1px solid #005500; border-radius: 4px; padding: 5px 10px; margin-bottom: 10px; font-size: 15px; font-weight: 700; color: #88ffaa; font-family: Arial, sans-serif; }
.fa { font-family: Arial, sans-serif; font-size: 14px; color: #aaffcc; line-height: 1.65; }
.nxt {
  width: 100%; padding: 11px; background: #001800; border: 1px solid var(--green);
  border-radius: 5px; color: var(--green); font-family: var(--sans); font-size: 16px;
  font-weight: 900; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; transition: all .15s;
}
.nxt:hover { background: #003300; }
.pg {
  display: flex; justify-content: space-between; align-items: center;
  font-family: var(--mono); font-size: 9px; color: var(--green-mid); letter-spacing: 1px; margin-bottom: 12px;
}
.pbw { flex: 1; height: 2px; background: #0d2a0d; margin: 0 10px; border-radius: 1px; overflow: hidden; }
.pbi { height: 100%; background: var(--green); border-radius: 1px; transition: width .4s; }
.end { text-align: center; padding: 36px 18px; }
.et { font-family: var(--mono); font-size: 11px; color: #1a5a1a; letter-spacing: 3px; margin-bottom: 10px; }
.es { font-size: 64px; font-weight: 700; color: var(--green); line-height: 1; margin-bottom: 5px; font-family: Arial, sans-serif; }
.ep { font-family: var(--mono); font-size: 10px; color: #1a7a1a; letter-spacing: 2px; margin-bottom: 16px; }
.eg { font-size: 18px; font-weight: 700; letter-spacing: 2px; margin-bottom: 20px; padding: 9px 16px; border-radius: 5px; display: inline-block; font-family: Arial, sans-serif; }
.eg.p  { background: #001400; border: 1px solid var(--green); color: var(--green); }
.eg.rv { background: #140a00; border: 1px solid #cc7700; color: #ff9900; }
.eg.f  { background: #140000; border: 1px solid var(--red); color: var(--red); }
.rs {
  padding: 12px 28px; background: #001800; border: 1px solid var(--green); border-radius: 5px;
  color: var(--green); font-family: var(--sans); font-size: 16px; font-weight: 900;
  letter-spacing: 3px; text-transform: uppercase; cursor: pointer; display: inline-block; margin-bottom: 8px;
}
.rs:hover { background: #003300; }
.em { text-align: left; margin-top: 16px; border-top: 1px solid #0d2a0d; padding-top: 12px; }
.ml { font-family: var(--mono); font-size: 9px; color: #884400; letter-spacing: 2px; margin-bottom: 7px; }
.mi { font-size: 12px; color: #bb4400; margin-bottom: 4px; font-family: var(--mono); }
.intro { text-align: center; padding: 36px 18px; }
.it { font-family: var(--mono); color: var(--green); font-size: 11px; letter-spacing: 3px; margin-bottom: 7px; }
.is { font-size: 28px; font-weight: 900; color: #5ab85a; margin-bottom: 5px; font-family: var(--sans); }
.id { font-family: var(--mono); font-size: 10px; color: #1a5a1a; letter-spacing: 1px; margin-bottom: 20px; line-height: 1.9; }
.st {
  padding: 13px 36px; background: #001800; border: 1px solid var(--green); border-radius: 5px;
  color: var(--green); font-family: var(--sans); font-size: 18px; font-weight: 900;
  letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
}
.st:hover { background: #003300; }
.footer {
  text-align: center; margin-top: 14px;
  font-family: var(--mono); font-size: 9px; color: #1a3a1a; letter-spacing: 1.5px;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="r" id="root"></div>
  <div class="footer">COMPRESS TO SUCCESS &nbsp;◆&nbsp; UCI HEALTH ALERT RN &nbsp;◆&nbsp; 2026</div>
</div>

<script>
const CPR_DUR = 4.2;
const ANALYZE_DUR = 2.0;

const RHYTHMS = [
  {
    id:'vtach', shockable:true, name:'Pulseless Ventricular Tachycardia', abbr:'Pulseless V-Tach', pulse:false,
    action:'Activate CODE BLUE. Begin HIGH QUALITY CPR. Deliver a SHOCK as soon as the defibrillator is ready.',
    gen(t){ const cw=0.42, r=1/3.5, p=t%r; return p<cw ? Math.sin(Math.PI*p/cw)*1.1 : -Math.sin(Math.PI*(p-cw)/(r-cw))*0.55; }
  },
  {
    id:'asystole', shockable:false, name:'Asystole', abbr:'Asystole', pulse:false,
    action:"Activate CODE BLUE. Begin HIGH QUALITY CPR. Administer EPINEPHRINE. Treat reversible causes (H's & T's).",
    gen(t){ return Math.sin(t*7.3)*0.03 + Math.sin(t*13.1)*0.02; }
  },
  {
    id:'cvfib', shockable:true, name:'Coarse Ventricular Fibrillation', abbr:'Coarse V-Fib', pulse:false,
    action:'Activate CODE BLUE. Begin HIGH QUALITY CPR. Deliver a SHOCK as soon as the defibrillator is ready.',
    _s:null,
    gen(t){
      if(!this._s){ this._s=[]; for(let i=0;i<8;i++) this._s.push({f:1+i*1.4+Math.sin(i)*0.4, a:0.5-i*0.04, p:i*0.97}); }
      let v=0; this._s.forEach(s => v += s.a*Math.sin(2*Math.PI*s.f*t+s.p)); return v*0.88;
    }
  },
  {
    id:'nsr', shockable:false, name:'Normal Sinus Rhythm', abbr:'NSR', pulse:true,
    action:'Pulse is present. Check vital signs and proceed per clinical judgment.',
    gen(t){
      const r=0.83, p=t%r;
      if(p<0.09) return 0.18*Math.sin(Math.PI*p/0.09);
      if(p>=0.11&&p<0.14) return -0.12*Math.sin(Math.PI*(p-0.11)/0.03);
      if(p>=0.14&&p<0.20) return 1.15*Math.sin(Math.PI*(p-0.14)/0.06);
      if(p>=0.20&&p<0.24) return -0.28*Math.sin(Math.PI*(p-0.20)/0.04);
      if(p>=0.26&&p<0.46) return 0.22*Math.sin(Math.PI*(p-0.26)/0.20);
      return 0;
    }
  },
  {
    id:'torsades', shockable:true, name:'Torsades de Pointes', abbr:'Polymorphic V-Tach', pulse:false,
    action:'Activate CODE BLUE. Begin HIGH QUALITY CPR. Deliver a SHOCK. Primary team will administer Magnesium 2g IVP.',
    gen(t){ const r=1/3.3, cw=0.28, p=t%r; return Math.sin(2*Math.PI*0.28*t)*(p<cw ? Math.sin(Math.PI*p/cw)*1.45 : 0); }
  },
  {
    id:'junctional', shockable:false, name:'Junctional Escape Rhythm', abbr:'Junctional Escape', pulse:true,
    action:'Pulse is present. Check vital signs and hemodynamic stability. Proceed per clinical judgment.',
    gen(t){
      const r=1.43, p=t%r;
      if(p<0.07) return 1.05*Math.sin(Math.PI*p/0.07);
      if(p>=0.07&&p<0.11) return -0.22*Math.sin(Math.PI*(p-0.07)/0.04);
      if(p>=0.13&&p<0.33) return 0.18*Math.sin(Math.PI*(p-0.13)/0.20);
      return 0;
    }
  },
  {
    id:'fvfib', shockable:true, name:'Fine Ventricular Fibrillation', abbr:'Fine V-Fib', pulse:false,
    action:"Activate CODE BLUE. Begin HIGH QUALITY CPR. Deliver a SHOCK. Fine V-Fib can look like asystole — look closely.",
    _s:null,
    gen(t){
      if(!this._s){ this._s=[]; for(let i=0;i<7;i++) this._s.push({f:2+i*2.2+Math.sin(i*1.3)*0.5, a:0.13-i*0.01, p:i*1.1}); }
      let v=0; this._s.forEach(s => v += s.a*Math.sin(2*Math.PI*s.f*t+s.p)); return v;
    }
  },
  {
    id:'sbrad', shockable:false, name:'Sinus Bradycardia', abbr:'Sinus Brady', pulse:true,
    action:'Pulse is present. Check vital signs and hemodynamic stability. Proceed per clinical judgment.',
    gen(t){
      const r=1.67, p=t%r;
      if(p<0.09) return 0.18*Math.sin(Math.PI*p/0.09);
      if(p>=0.11&&p<0.14) return -0.12*Math.sin(Math.PI*(p-0.11)/0.03);
      if(p>=0.14&&p<0.20) return 1.15*Math.sin(Math.PI*(p-0.14)/0.06);
      if(p>=0.20&&p<0.24) return -0.28*Math.sin(Math.PI*(p-0.20)/0.04);
      if(p>=0.26&&p<0.46) return 0.22*Math.sin(Math.PI*(p-0.26)/0.20);
      return 0;
    }
  },
  {
    id:'pea', shockable:false, name:'Pulseless Electrical Activity', abbr:'PEA', pulse:false,
    action:"Activate CODE BLUE. Begin HIGH QUALITY CPR. Administer EPINEPHRINE. Aggressively treat reversible causes (H's & T's).",
    gen(t){
      const r=1.09, p=t%r;
      if(p<0.09) return 0.15*Math.sin(Math.PI*p/0.09);
      if(p>=0.11&&p<0.14) return -0.10*Math.sin(Math.PI*(p-0.11)/0.03);
      if(p>=0.14&&p<0.20) return 0.90*Math.sin(Math.PI*(p-0.14)/0.06);
      if(p>=0.20&&p<0.24) return -0.22*Math.sin(Math.PI*(p-0.20)/0.04);
      if(p>=0.26&&p<0.46) return 0.18*Math.sin(Math.PI*(p-0.26)/0.20);
      return 0;
    }
  },
  {
    id:'agonal', shockable:false, name:'Agonal Rhythm', abbr:'Agonal', pulse:false,
    action:'Activate CODE BLUE. Begin HIGH QUALITY CPR. Administer EPINEPHRINE. Treat reversible causes.',
    gen(t){ const r=4.8, p=t%r, cw=0.72; return p<cw ? (0.55*Math.sin(Math.PI*p/cw) + 0.30*Math.sin(2*Math.PI*p/cw)) : 0; }
  }
];

function cprArtifact(t){
  const rate=1.8, p=(t%(1/rate))*rate;
  const comp = p<0.45 ? Math.sin(Math.PI*p/0.45)*1.3 : 0;
  return comp + Math.sin(t*23.1)*0.12 + Math.sin(t*47.3)*0.07 + Math.sin(t*11.7)*0.09;
}

function shuffle(a){ const b=[...a]; for(let i=b.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [b[i],b[j]]=[b[j],b[i]]; } return b; }

let qs=[], cur=0, answered=false, score=0, missed=[], phase='intro';
let animId=null, simT=0, lastTS=null, cprPhase='cpr', phaseT=0;

function startQuiz(){
  qs = shuffle(RHYTHMS.map(r => ({...r, _s:null})));
  cur=0; answered=false; score=0; missed=[]; phase='quiz'; render();
}

function stopAnim(){ if(animId){ cancelAnimationFrame(animId); animId=null; } lastTS=null; }

function startAnim(rhythm){
  stopAnim();
  simT=0; phaseT=0; cprPhase='cpr';
  const canvas = document.getElementById('ekgc');
  if(!canvas) return;

  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 640;
  const cssH = 128;
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);

  const W=cssW, H=cssH, MID=H/2, SCALE=H*0.34, PPS=200, ERASER=18;
  const buf = new Float32Array(W);
  let xPos = 0;

  ctx.fillStyle='#020802'; ctx.fillRect(0,0,W,H);
  drawFullGrid(ctx,W,H);

  function drawFullGrid(c,W,H){
    c.strokeStyle='#0d2a0d'; c.lineWidth=0.5;
    for(let x=0;x<=W;x+=W/20){ c.beginPath(); c.moveTo(x,0); c.lineTo(x,H); c.stroke(); }
    for(let y=0;y<=H;y+=H/5){ c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke(); }
    c.strokeStyle='#071407'; c.lineWidth=0.2;
    for(let x=0;x<=W;x+=W/100){ c.beginPath(); c.moveTo(x,0); c.lineTo(x,H); c.stroke(); }
    for(let y=0;y<=H;y+=H/25){ c.beginPath(); c.moveTo(0,y); c.lineTo(W,y); c.stroke(); }
  }

  function drawGridStrip(x,w){
    ctx.save(); ctx.beginPath(); ctx.rect(x,0,w,H); ctx.clip();
    ctx.fillStyle='#020802'; ctx.fillRect(x,0,w,H);
    ctx.strokeStyle='#0d2a0d'; ctx.lineWidth=0.5;
    for(let gx=0;gx<=W;gx+=W/20) if(gx>=x-1&&gx<=x+w+1){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for(let gy=0;gy<=H;gy+=H/5){ ctx.beginPath(); ctx.moveTo(x,gy); ctx.lineTo(x+w,gy); ctx.stroke(); }
    ctx.strokeStyle='#071407'; ctx.lineWidth=0.2;
    for(let gx=0;gx<=W;gx+=W/100) if(gx>=x-1&&gx<=x+w+1){ ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    ctx.restore();
  }

  function getSample(t){
    if(cprPhase==='cpr') return cprArtifact(t);
    if(cprPhase==='analyze'){ const fade=Math.max(0,1-(phaseT/ANALYZE_DUR)); return cprArtifact(t)*fade*0.55; }
    return rhythm.gen(t);
  }

  function frame(ts){
    if(!lastTS) lastTS=ts;
    const dt = Math.min((ts-lastTS)/1000, 0.05);
    lastTS=ts; simT+=dt; phaseT+=dt;

    if(cprPhase==='cpr' && phaseT>=CPR_DUR){ cprPhase='analyze'; phaseT=0; updateBadge('analyze'); }
    else if(cprPhase==='analyze' && phaseT>=ANALYZE_DUR){ cprPhase='rhythm'; phaseT=0; updateBadge('rhythm'); if(!answered) unlockButtons(); }

    if(cprPhase==='cpr'){
      const el=document.getElementById('cprfill');
      if(el) el.style.width=(Math.min(phaseT/CPR_DUR,1)*100)+'%';
    }

    const steps = Math.max(1, Math.ceil(PPS*dt));
    for(let s=0;s<steps;s++){
      const st = simT-dt+(s/steps)*dt;
      const val = getSample(st);
      const x = Math.floor(xPos) % W;
      buf[x] = val;
      drawGridStrip((x+ERASER)%W, ERASER+2);
      const px = (x-1+W)%W;
      ctx.strokeStyle='#00e676'; ctx.lineWidth=1.8; ctx.lineCap='round'; ctx.lineJoin='round';
      ctx.beginPath(); ctx.moveTo(px, MID-buf[px]*SCALE); ctx.lineTo(x, MID-val*SCALE); ctx.stroke();
      xPos = (xPos + 1/steps) % W;
    }
    animId = requestAnimationFrame(frame);
  }
  animId = requestAnimationFrame(frame);
}

function updateBadge(ph){
  const el=document.getElementById('pbadge'); if(!el) return;
  if(ph==='analyze'){ el.className='phase-badge phase-analyze'; el.textContent='ANALYZING — DO NOT TOUCH PATIENT'; }
  else if(ph==='rhythm'){ el.className='phase-badge phase-rhythm'; el.textContent='RHYTHM IDENTIFIED'; }
}

function unlockButtons(){
  const s=document.getElementById('shockbtn'), n=document.getElementById('noshockbtn');
  const pt=document.getElementById('ptxt');
  if(s){ s.disabled=false; s.classList.remove('locked'); }
  if(n){ n.disabled=false; n.classList.remove('locked'); }
  if(pt){
    const q=qs[cur];
    pt.textContent='Patient is unresponsive. '+(q.pulse?'Pulse IS present.':'NO pulse detected.');
    pt.style.color = q.pulse?'#00e676':'#cccccc';
  }
  const cl=document.getElementById('cprlbl'); if(cl) cl.textContent='▶ RHYTHM CLEAR — MAKE YOUR CALL';
}

function answerQ(shock){
  if(answered) return; answered=true;
  const q=qs[cur]; const correct=shock===q.shockable;
  if(correct) score++; else missed.push(q.name);
  let sbC='btn bs', nbC='btn bn';
  if(shock===true){ sbC='btn '+(correct?'sc':'sw'); if(!correct) nbC='btn rv'; }
  else            { nbC='btn '+(correct?'sc':'sw'); if(!correct) sbC='btn rv'; }
  const fb=document.getElementById('fbarea');
  if(fb) fb.innerHTML=`<div class="fb ${correct?'ok':'no'}">
    <div class="ft">${correct?'▸ CORRECT':'▸ INCORRECT'}</div>
    <div class="fr">${q.name} (${q.abbr})</div>
    <div class="fa">${q.action}</div>
  </div>`;
  const nxt=document.getElementById('nxtbtn'); if(nxt) nxt.style.display='block';
  const sb=document.getElementById('shockbtn'), nb=document.getElementById('noshockbtn');
  if(sb){ sb.disabled=true; sb.className=sbC; }
  if(nb){ nb.disabled=true; nb.className=nbC; }
}

function nextQ(){
  cur++; answered=false;
  if(cur>=qs.length) phase='end';
  render();
}

function render(){
  const root=document.getElementById('root');
  stopAnim();

  if(phase==='intro'){
    root.innerHTML=`<div class="intro">
      <div class="it">▶ ALERT TEAM TRAINING MODULE</div>
      <div class="is">SHOCK OR NO SHOCK?</div>
      <div class="id">
        Each scenario starts mid-resuscitation.<br>
        CPR artifact runs &rarr; compressions pause &rarr; rhythm clears.<br>
        Identify the rhythm. Make your call.<br>
        10 rhythms &nbsp;&bull;&nbsp; Randomized every attempt.
      </div>
      <button class="st" onclick="startQuiz()">INITIATE QUIZ</button>
    </div>`;
    return;
  }

  if(phase==='end'){
    const pct=Math.round(score/qs.length*100);
    let g,gc;
    if(pct>=90){ g='CLEARED FOR RESPONSE'; gc='p'; }
    else if(pct>=70){ g='REVIEW RECOMMENDED'; gc='rv'; }
    else{ g='REMEDIATION REQUIRED'; gc='f'; }
    const mh=missed.length?`<div class="em"><div class="ml">▸ REVIEW THESE RHYTHMS</div>${missed.map(m=>`<div class="mi">▹ ${m}</div>`).join('')}</div>`:'';
    root.innerHTML=`<div class="end">
      <div class="et">SESSION COMPLETE</div>
      <div class="es">${score}/${qs.length}</div>
      <div class="ep">${pct}% ACCURACY</div>
      <div class="eg ${gc}">${g}</div><br><br>
      <button class="rs" onclick="startQuiz()">RUN AGAIN</button>
      ${mh}
    </div>`;
    return;
  }

  const q=qs[cur];
  const prog=(cur/qs.length)*100;
  const dots=qs.map((_,i)=>{
    let c='dot';
    if(i<cur) c+=missed.some(m=>m===qs[i].name)?' no':' ok';
    return `<div class="${c}"></div>`;
  }).join('');

  root.innerHTML=`
  <div class="hdr">
    <div class="logo">ZOLL R SERIES ◆ COMPRESS TO SUCCESS</div>
    <div class="vits">
      <div class="vit">HR <span>---</span></div>
      <div class="vit">SpO2 <span>---</span></div>
      <div class="vit">NIBP <span>---/---</span></div>
    </div>
    <div class="dots">${dots}</div>
  </div>
  <div class="body">
    <div class="pg">
      <span>RHYTHM ${cur+1} OF ${qs.length}</span>
      <div class="pbw"><div class="pbi" style="width:${prog}%"></div></div>
      <span>SCORE ${score}</span>
    </div>
    <div class="lbl">
      <span>▶ LEAD II &nbsp;|&nbsp; 25mm/s &nbsp;|&nbsp; 10mm/mV</span>
      <span class="phase-badge phase-cpr" id="pbadge">CPR IN PROGRESS</span>
    </div>
    <div class="screen"><canvas id="ekgc"></canvas></div>
    <div class="cpr-label" id="cprlbl">▶ COMPRESSIONS ONGOING — STAND BY FOR ANALYSIS</div>
    <div class="cpr-bar"><div class="cpr-fill" id="cprfill" style="width:0%"></div></div>
    <div class="qs">CLINICAL SCENARIO</div>
    <div class="pt" id="ptxt" style="color:#2a6a2a">Patient is unresponsive. CPR in progress...</div>
    <div id="fbarea"></div>
    <div class="btns">
      <button class="btn bs locked" id="shockbtn" disabled onclick="answerQ(true)">&#9889; SHOCK</button>
      <button class="btn bn locked" id="noshockbtn" disabled onclick="answerQ(false)">&#10007; NO SHOCK</button>
    </div>
    <button class="nxt" id="nxtbtn" style="display:none" onclick="nextQ()">${cur+1<qs.length?'NEXT RHYTHM &#9654;':'VIEW RESULTS &#9654;'}</button>
  </div>`;

  requestAnimationFrame(() => startAnim(q));
}

render();
</script>
</body>
</html>
